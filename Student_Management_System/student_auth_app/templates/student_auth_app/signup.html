{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}
    <title>Register</title>
{% endblock %}

{% block css %}
    <link rel="stylesheet" href="{% static 'student_app/css/add_student.css' %}">
{% endblock %}

{% block content %}
<div class="container">
    <h1>Sign Up / Register</h1>
    <form method="post">
        {% csrf_token %}
        {{form | crispy}}
        <button type="submit" class="btn btn-light col-5">Sign Up</button>
        <a href="{% url 'signin' %}"><button type="button" class="btn btn-light col-5 float-end">Sign In</button></a>
    </form>
</div>
{% endblock %}
