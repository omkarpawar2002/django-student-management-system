{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}
    <title>ADD STUDENT</title>
{% endblock %}

{% block css %}
    <link rel="stylesheet" href="{% static 'student_app/css/add_student.css' %}">
{% endblock %}

{% block content %}
<div class="container">
    <h1>Add Student Details</h1>
    <form method="post">
        {% csrf_token %}
        {{form | crispy}}
        <button type="submit" class="btn btn-light col-5">Add Student</button>
        <button type="reset" class="btn btn-light col-5 float-end">Reset Student</button>
    </form>
</div>
{% endblock %}
