{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block css %}
    {% endblock %}

    {% block title %}
    <title>ADD TITLE</title>
    {% endblock %}
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand text-light" href="#">Student Management</a>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link text-light" href="{% url 'add_student' %}">Add Student</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" href="{% url 'view_student' %}">View Student</a>
                    </li>

                </ul>
                <form class="d-flex" role="search">
                    <!-- <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" /> -->
                    {% if user.is_authenticated %}
                    <span id="user_login" style="
                            color: white;
                            margin-top: 4px;
                            margin-right: 18px;
                            font-size: 18px;
                            font-weight: 600;">
                        {{user.username}}</span>
                    <a href="{% url 'signout' %}"><button class="btn btn-outline-light me-3" type="button">Sign
                            Out</button></a>
                    {% else %}
                    <a href="{% url 'signup' %}"><button class="btn btn-outline-light me-3" type="button">Sign
                            Up</button></a>
                    <a href="{% url 'signin' %}"><button class="btn btn-outline-light me-3" type="button">Sign
                            In</button></a>
                    {% endif %}
                </form>
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
